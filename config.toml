[general]
# Start Satty in fullscreen mode
fullscreen = true
# Exit directly after copy/save action
early-exit = true
# Draw corners of rectangles round if the value is greater than 0 (0 disables rounded corners)
corner-roundness = 12
# Select the tool on startup [possible values: pointer, crop, line, arrow, rectangle, text, marker, blur, brush]
initial-tool = "brush"
# Configure the command to be called on copy, for example `wl-copy`
copy-command = "wl-copy"
# Increase or decrease the size of the annotations
annotation-size-factor = 2
# Filename to use for saving action. Omit to disable saving to file. Might contain format specifiers: https://docs.rs/chrono/latest/chrono/format/strftime/index.html
# Starting with NEXTRELEASE, save as uses this as initial filename/path when available
output-filename = "/tmp/test-%Y-%m-%d_%H:%M:%S.png"
# After copying the screenshot, save it to a file as well
save-after-copy = false
# Hide toolbars by default
default-hide-toolbars = false
# Experimental: whether window focus shows/hides toolbars. This does not affect initial state of toolbars, see default-hide-toolbars.
focus-toggles-toolbars = false
# Fill shapes by default
default-fill-shapes = false
# The primary highlighter to use, the other is accessible by holding CTRL at the start of a highlight [possible values: block, freehand]
primary-highlighter = "block"
# Disable notifications
disable-notifications = false
# Actions to trigger on right click (order is important)
# [possible values: save-to-clipboard, save-to-file, exit]
actions-on-right-click = []
# Actions to trigger on Enter key (order is important)
# [possible values: save-to-clipboard, save-to-file, exit]
actions-on-enter = ["save-to-clipboard"]
# Actions to trigger on Escape key (order is important)
# [possible values: save-to-clipboard, save-to-file, exit]
actions-on-escape = ["exit"]
# Action to perform when the Enter key is pressed [possible values: save-to-clipboard, save-to-file]
# Deprecated: use actions-on-enter instead
action-on-enter = "save-to-clipboard"
# Right click to copy
# Deprecated: use actions-on-right-click instead
right-click-copy = false
# request no window decoration. Please note that the compositor has the final say in this. At this point. requires xdg-decoration-unstable-v1.
no-window-decoration = true
# experimental feature: adjust history size for brush input smoothing (0: disabled, default: 0, try e.g. 5 or 10)
brush-smooth-history-size = 10

# Tool selection keyboard shortcuts
[keybinds]
# Global
"<Control><Shift>d" = "open-gtk-inspector"
"<Alt>Left" = "pan-left"
"<Alt>Right" = "pan-right"
"<Alt>Up" = "pan-up"
"<Alt>Down" = "pan-down"
"Delete" = "delete-selection"
"Escape" = "run-actions-on-escape"
"Return" = "run-actions-on-enter"
"<Control>t" = "toggle-toolbars"

# top toolbar
"<Control>1" = "original-scale"
"<Control>2" = "fit-to-window"
"<Shift>Delete" = "reset-all"
"<Control>z" = "undo"
"<Control>y" = "redo"
"p" = "pointer"
"c" = "crop"
"b" = "brush"
"i" = "line"
"z" = "arrow"
"r" = "rectangle"
"e" = "ellipse"
"t" = "text"
"m" = "marker"
"u" = "blur"
"x" = "pixelate"
"g" = "highlight"
"<Control>s" = "save-to-file"
"<Control><Shift>s" = "save-to-file-as"
"<Control>c" = "save-to-clipboard"
"<Control><Shift>c" = "copy-filepath-to-clipboard"

# bottom toolbar
"1" = "select-color-index-1"
"2" = "select-color-index-2"
"3" = "select-color-index-3"
"4" = "select-color-index-4"
"5" = "select-color-index-5"
"6" = "select-color-index-6"
"7" = "select-color-index-7"
"8" = "select-color-index-8"
"9" = "select-color-index-9"
"minus" = "cycle-size"
#"..." = "select-size-(small|medium|large)"
"f" = "toggle-fill"

# Font to use for text annotations
[font]
family = "Roboto"
style = "Regular"

# Custom colours for the colour palette
[color-palette]
# These will be shown in the toolbar for quick selection
palette = ["#00ffff", "#a52a2a", "#dc143c", "#ff1493", "#ffd700", "#008000"]

# These will be available in the color picker as presets
# Leave empty to use GTK's default
custom = ["#00ffff", "#a52a2a", "#dc143c", "#ff1493", "#ffd700", "#008000"]
